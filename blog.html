<nav class="sticky-nav" aria-label="Main navigation">
  <div class="nav-inner">
    <a class="nav-wordmark" href="index.html" aria-label="Muhammet Topal home">

<main>

<section class="blog-header">
  <h1 class="page-title">My Blog</h1>
  <p class="blog-subtitle">Essays, notes, videos, podcasts, and fragments.</p>
</section>

<section class="filter-panel" aria-label="Blog filters">
  <div class="filter-grid">
    <div class="field">
      <label for="blog-search">Search</label>
      <input id="blog-search" type="search" placeholder="Search title, content, or keywords...">
    </div>
    <div class="field">
      <label for="blog-format">Format</label>
      <select id="blog-format">
        <option value="all">All formats</option>
        <option value="essays">Essays</option>
        <option value="podcasts">Podcasts</option>
        <option value="videos">Videos</option>
      </select>
    </div>
    <div class="field">
      <label for="blog-tag">Tag</label>
      <select id="blog-tag">
        <option value="all">All tags</option>
        <option value="modernity">modernity</option>
        <option value="colonialism">colonialism</option>
        <option value="environment">environment</option>
      </select>
    </div>
    <div class="field">
      <label for="blog-from">From</label>
      <input id="blog-from" type="date">
    </div>
    <div class="field">
      <label for="blog-to">To</label>
      <input id="blog-to" type="date">
    </div>
    <div class="field">
      <label for="blog-sort">Sort</label>
      <select id="blog-sort">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>
  </div>

  <div class="filter-buttons">
    <button class="active" type="button" data-category="all">All</button>
    <button type="button" data-category="essays">Essays</button>
    <button type="button" data-category="podcasts">Podcasts</button>
    <button type="button" data-category="videos">Videos</button>
    <button type="button" data-reset-filters>Reset</button>
  </div>

  <p class="result-count" data-result-count>1 result</p>
</section>

<div data-blog-root></div>

</main>
<footer class="footer">
  <img src="assets/topal-wordmark-transparent.png" alt="Topal">
  <div>© <span id="year">2026</span> Muhammet Topal</div>
</footer>
<script src="js/site.js"></script>
<script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
