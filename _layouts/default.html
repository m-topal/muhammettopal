<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="masthead">
      <a class="site-title" href="{{ '/' | relative_url }}">Muhammet Topal</a>
      <p class="site-keywords">Late Ottoman Empire · intellectual history · print culture · political opposition · Caucasus</p>
    </div>
    <nav class="main-nav" aria-label="Primary navigation">
      <div class="nav-main">
        <a href="{{ '/#home' | relative_url }}">Home</a>
        <a href="{{ '/#research' | relative_url }}">Research</a>
        <a href="{{ '/#teaching' | relative_url }}">Teaching</a>
        <a href="{{ '/#publications' | relative_url }}">Publications</a>
        <a href="{{ '/#cv' | relative_url }}">CV</a>
        <a href="{{ '/#contact' | relative_url }}">Contact</a>
      </div>
      <a class="blog-portal {% if page.url contains '/blog' %}active{% endif %}" href="{{ '/blog/' | relative_url }}">Blog</a>
    </nav>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>© {{ site.time | date: '%Y' }} Muhammet Topal</span>
    <span><a href="mailto:{{ site.email }}">{{ site.email }}</a></span>
    <span><a href="{{ '/feed.xml' | relative_url }}">RSS</a></span>
  </footer>
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
</body>
</html>
