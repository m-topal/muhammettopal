---
layout: default
---
<article class="page narrow">
  <p class="meta">{{ page.format | default: page.category | upcase }} · {{ page.date | date: "%B %-d, %Y" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
  <div class="prose">
    {{ content }}
  </div>
</article>
