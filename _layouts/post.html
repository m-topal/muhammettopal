---
layout: default
---
<article class="page narrow post-page">
  <p class="meta">{{ page.format | default: page.category | capitalize }} · {{ page.date | date: "%B %-d, %Y" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
<div class="prose post-content">
    {{ content }}

  <div class="post-page-actions" data-post-title="{{ page.title | escape }}" data-post-url="{{ page.url | absolute_url }}">
    <button class="post-like-button" type="button" data-post-id="{{ page.url | slugify }}">♡ Like <span class="like-count" aria-live="polite">0</span></button>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener">Share on Facebook</a>
    <a href="https://twitter.com/intent/tweet?url={{ page.url | absolute_url | url_encode }}&text={{ page.title | url_encode }}" target="_blank" rel="noopener">Share on X</a>
    <a href="mailto:?subject={{ page.title | url_encode }}&body={{ page.url | absolute_url | url_encode }}">Share by email</a>
    <a href="#comments">Comment</a>
  </div>

  </div>

<section id="comments" class="post-comments">
  <h2>Comments</h2>
  <script src="https://giscus.app/client.js"
          data-repo="m-topal/muhammettopal"
          data-repo-id="R_kgDOTL6pDQ"
          data-category="Announcements"
          data-category-id="DIC_kwDOTL6pDc4DAcSz"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="1"
          data-input-position="bottom"
          data-theme="light"
          data-lang="en"
          crossorigin="anonymous"
          async>
  </script>
</section>

</article>
