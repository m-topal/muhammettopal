---
layout: default
---
<article class="post-page">
  <p class="section-label">{{ page.format | default: page.category | default: 'Blog' }}</p>
  <h1>{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.read_time %} · {{ page.read_time }}{% endif %}</p>
  {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
